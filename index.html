<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BlockVerse — конструктор и игра</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        /* Все ваши стили из предыдущего index.html, только без блока авторизации */
        /* Скопируйте сюда ваш полный CSS из исходного index.html */
        /* Ниже – краткий пример, но вы должны перенести свой CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; overflow: hidden; height: 100vh; width: 100%; position: fixed; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden; padding: 20px; }
        .hidden { display: none; }
        /* остальные стили из вашего текущего index.html */
    </style>
</head>
<body>
<script>
    if (!sessionStorage.getItem('blockverse_session')) {
        window.location.href = 'login.html';
    }
</script>

<div id="mainMenuScreen" class="screen">
    <!-- ваш основной интерфейс, как и был, без authScreen -->
    <div class="header">...</div>
    <div id="gamesPanel">...</div>
    <div id="myProjectsPanel">...</div>
    <div id="shopPanel">...</div>
    <div id="socialPanel">...</div>
    <div id="settingsPanel">...</div>
</div>

<div id="editorScreen" class="screen hidden">
    <!-- весь ваш редактор -->
</div>

<div id="customGameScreen" class="screen hidden">
    <div id="customGameContainer" style="width:100%; height:100%;"></div>
    <div class="exit-game" id="exitGameBtn">✖ Выйти</div>
    <div class="custom-game-ui">Счёт: 0</div>
</div>

<div id="mobileControls">
    <div style="position: relative; width: 100%; height: 150px;">
        <div id="joystickContainer">
            <div id="joystickBase">
                <div id="joystickThumb"></div>
            </div>
        </div>
        <button id="mobileJumpBtn">ПРЫЖОК</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>
<script type="module" src="platform.js"></script>
<script type="module" src="editor.js"></script>
</body>
</html>
