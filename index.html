<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BlockVerse — конструктор и игра</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        /* ВСЕ ВАШИ СТИЛИ (оставьте как есть) */
        /* ... здесь ваш существующий CSS ... */
        /* Убедитесь, что стили для новых вкладок и подразделов уже есть */
    </style>
</head>
<body>
<script>
    // Проверка сессии
    if (!sessionStorage.getItem('blockverse_session')) {
        window.location.href = 'login.html';
    }
</script>

<div id="mainMenuScreen" class="screen">
    <!-- ваш существующий header, панели игр, проектов и т.д. -->
</div>

<div id="editorScreen" class="screen hidden">
    <div class="editor-layout">
        <div class="top-bar">
            <div class="tool-group">
                <button id="modeMoveBtn" class="active">Переместить</button>
                <button id="modeRotateBtn">Печать</button>
                <button id="modeScaleBtn">Модель</button>
                <button id="workBtn">Работа</button>
                <button id="addCubeBtn">Кубика</button>
                <button id="deleteBtn">Сдача</button>
                <button id="duplicateBtn">Кол-во</button>
                <button id="groupBtn">Букет</button>
                <button id="groupBtn2">Группа</button>
                <button id="saveGameBtn">Сохранить</button>
                <button id="publishGameBtn">Опубликовать</button>
                <button id="addBlockBtn">Блок</button>
            </div>
            <div class="tabs">
                <div class="tab active" data-tab="blocks">Блоки</div>
                <div class="tab" data-tab="vfx">VFX</div>
                <div class="tab" data-tab="animations">Анимации</div>
                <div class="tab" data-tab="scripts">Скрипты</div>
                <div class="tab" data-tab="gui">GUI</div>
                <div class="tab" data-tab="npc">NPC</div>
                <div class="tab" data-tab="sculpt">Скульптинг</div>
            </div>
        </div>

        <!-- Подразделы -->
        <div id="subpanelBlocks" class="sub-panels active">
            <div class="block-palette">
                <div class="block-option" data-type="wood" style="background:#8B5A2B;"></div>
                <div class="block-option" data-type="stone" style="background:#808080;"></div>
                <div class="block-option" data-type="concrete" style="background:#B0B0B0;"></div>
                <div class="block-option" data-type="dirt" style="background:#6B4C3B;"></div>
            </div>
        </div>
        <div id="subpanelVfx" class="sub-panels">
            <div style="color: white; margin-bottom: 8px;">✨ Системы частиц</div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;">
                <button id="addParticleBtn" style="background:#ff5722;">➕ Добавить частицы</button>
                <button id="vfxFireBtn" style="background:#ff884d;">🔥 Огонь</button>
                <button id="vfxWaterBtn" style="background:#2a6f8a;">💧 Вода</button>
                <button id="vfxAirBtn" style="background:#aaccff;">💨 Воздух</button>
                <button id="vfxSmokeBtn" style="background:#888;">🌫️ Дым</button>
            </div>
        </div>
        <div id="subpanelAnimations" class="sub-panels">
            <div style="display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;">
                <button id="newAnimationBtn">➕ Создать</button>
                <select id="animationSelect">
                    <option value="">-- Выберите анимацию --</option>
                </select>
                <button id="playAnimationBtn">▶ Воспроизвести</button>
                <button id="stopAnimationBtn">⏹ Стоп</button>
                <button id="recordAnimationBtn">🎥 Записать</button>
            </div>
            <div style="background:#1a1f2e; border-radius:8px; padding:8px;">
                <div id="timeline" style="position:relative; height:120px; background:#2c2f36; border-radius:8px; overflow-x:auto;">
                    <canvas id="timelineCanvas" width="1000" height="120" style="display:block; background:#2c2f36;"></canvas>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 4px;">
                    <span id="currentTime">0.00</span>
                    <span id="animationDuration">1.00</span>
                </div>
            </div>
            <div style="margin-top: 8px;">
                <div id="keyframeList" style="max-height: 100px; overflow-y: auto; background:#1a1f2e; border-radius:8px; padding:4px;"></div>
            </div>
        </div>
        <div id="subpanelScripts" class="sub-panels">
            <div style="color: white; margin-bottom: 8px;">📜 Скрипт для выбранного блока</div>
            <textarea id="blockScriptEditor" class="code-editor" rows="6" placeholder='// Ваш скрипт здесь'></textarea>
            <button id="applyScriptBtn" style="background:#ff5722; border:none; border-radius:20px; padding:6px 12px; margin-top:8px;">💾 Применить скрипт</button>
        </div>
        <div id="subpanelGui" class="sub-panels">
            <div style="color: white; margin-bottom: 8px;">🎨 GUI Элементы</div>
            <div style="display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;">
                <button id="addButtonBtn">➕ Кнопка</button>
                <button id="addPanelBtn">📦 Панель</button>
                <button id="addTextBtn">📝 Текст</button>
            </div>
            <div id="guiElementsList" style="max-height: 100px; overflow-y: auto; margin-bottom: 8px; background:#1a1f2e; border-radius:12px; padding:8px;"></div>
            <div class="gui-preview" id="guiPreview"></div>
        </div>
        <div id="subpanelNpc" class="sub-panels">
            <div style="margin-bottom: 12px;">
                <button id="createNpcBtn" style="background:#ff5722;">➕ Создать NPC</button>
                <button id="importModelBtn" style="background:#4a6e8a;">📁 Импорт GLTF</button>
            </div>
            <div id="npcList" style="max-height: 150px; overflow-y: auto;"></div>
            <div id="npcProperties" style="margin-top: 12px; background:#1a1f2e; border-radius:12px; padding:8px;">
                <h4>Свойства NPC</h4>
                <label>Имя: <input type="text" id="npcName" style="width:100%"></label>
                <label>Поведение:
                    <select id="npcBehavior">
                        <option value="idle">Стоять</option>
                        <option value="patrol">Патрулировать</option>
                        <option value="follow">Следовать за игроком</option>
                    </select>
                </label>
                <label>Скорость: <input type="number" id="npcSpeed" value="2" step="0.5"></label>
                <label>Диалог: <textarea id="npcDialog" rows="2" placeholder="Привет!"></textarea></label>
                <button id="saveNpcBtn" style="background:#ff5722; margin-top:8px;">Сохранить</button>
            </div>
        </div>
        <div id="subpanelSculpt" class="sub-panels">
            <div style="margin-bottom: 8px;">
                <button id="sculptBrushBtn" class="active" data-mode="pull">Тянуть</button>
                <button id="sculptSmoothBtn" data-mode="smooth">Сгладить</button>
                <button id="sculptFlattenBtn" data-mode="flatten">Выровнять</button>
                <button id="sculptResetBtn">Сбросить</button>
            </div>
            <label>Радиус: <input type="range" id="sculptRadius" min="0.1" max="2" step="0.05" value="0.5"></label>
            <label>Сила: <input type="range" id="sculptStrength" min="0" max="1" step="0.01" value="0.2"></label>
            <div id="sculptStatus">Выберите объект для скульптинга</div>
        </div>

        <div class="editor-main">
            <div class="viewport-area">
                <div id="editorCanvasContainer" class="editor-canvas"></div>
                <button class="exit-editor-btn" id="exitEditorBtn">✖ Выйти</button>
                <div class="status-bar" id="editorStatus">Готово</div>
            </div>
            <div class="right-panel">
                <div class="explorer-panel">
                    <div class="panel-header">📁 Проводник (Workspace)</div>
                    <div id="explorerTree" class="explorer-tree"></div>
                </div>
                <div class="properties-panel">
                    <div class="panel-header">⚙️ Свойства</div>
                    <div id="propertiesContent" class="properties-content"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="customGameScreen" class="screen hidden">
    <div id="customGameContainer" style="width:100%; height:100%;"></div>
    <div class="exit-game" id="exitGameBtn">✖ Выйти</div>
    <div class="custom-game-ui">Счёт: 0</div>
</div>

<div id="mobileControls">
    <div style="position: relative; width: 100%; height: 150px;">
        <div id="joystickContainer"><div id="joystickBase"><div id="joystickThumb"></div></div></div>
        <button id="mobileJumpBtn">ПРЫЖОК</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>
<script type="module" src="platform.js"></script>
<script type="module" src="editor.js"></script>
</body>
    </html>
