<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BlockWorld — конструктор и игра</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Главное меню */
        #menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transition: 0.3s;
        }
        .menu-container {
            background: #1e2a36;
            border-radius: 20px;
            padding: 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #4a6a8a;
        }
        .menu-container h1 {
            margin: 0 0 20px;
            font-size: 32px;
            color: #ffcc44;
        }
        .menu-container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #2a3a48;
            color: white;
            font-size: 16px;
        }
        .menu-container button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #3a6ea5;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-container button:hover {
            background: #4d7db8;
            transform: scale(1.02);
        }
        .menu-container .delete-btn {
            background: #8b3c3c;
        }
        .menu-container .delete-btn:hover {
            background: #aa4a4a;
        }
        .games-list {
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0;
            text-align: left;
        }
        .game-item {
            background: #2a3a48;
            margin: 5px 0;
            padding: 8px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-item span {
            cursor: pointer;
            flex-grow: 1;
        }
        .game-item button {
            width: auto;
            padding: 4px 12px;
            margin: 0 0 0 8px;
            background: #8b3c3c;
        }
        /* UI для редактора и игры */
        .game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30,30,40,0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            display: flex;
            gap: 12px;
            z-index: 200;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .game-ui button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .game-ui button:hover {
            background: #3e5a8a;
        }
        .material-btn {
            background: #1e2a3a;
            border-left: 4px solid;
        }
        .material-btn.active {
            background: #2c5f8a;
            box-shadow: 0 0 8px rgba(0,160,255,0.5);
        }
        #mode-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
            pointer-events: none;
            z-index: 200;
            color: #ffaa66;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ddd;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 200;
        }
        @media (max-width: 700px) {
            .game-ui { flex-wrap: wrap; max-width: 90%; padding: 8px 12px; gap: 8px; }
            .game-ui button { padding: 4px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- Главное меню -->
    <div id="menu">
        <div class="menu-container">
            <h1>⚡ BLOCKWORLD ⚡</h1>
            <input type="text" id="newGameName" placeholder="Название новой игры" value="Мой мир">
            <button id="createNewBtn">✨ Создать новую игру</button>
            <div style="margin: 15px 0 5px;">Сохранённые игры:</div>
            <div id="gamesList" class="games-list">
                <!-- список будет заполнен скриптом -->
            </div>
            <button id="loadSelectedBtn">▶ Загрузить выбранную</button>
            <button id="deleteSelectedBtn" class="delete-btn">🗑 Удалить выбранную</button>
        </div>
    </div>

    <!-- UI для редактора/игры (изначально скрыт) -->
    <div id="gameUI" style="display: none;">
        <div class="game-ui">
            <span>🏗️ Материал:</span>
            <button id="wood" class="material-btn" style="border-left-color: #b87c4f;">Дерево</button>
            <button id="stone" class="material-btn" style="border-left-color: #8a8a8a;">Камень</button>
            <button id="brick" class="material-btn" style="border-left-color: #b54e3a;">Кирпич</button>
            <button id="grass" class="material-btn" style="border-left-color: #5a9e4e;">Трава</button>
            <div style="width:1px; background: rgba(255,255,255,0.3); margin:0 6px;"></div>
            <button id="saveGameBtn">💾 Сохранить игру</button>
            <button id="modeToggleBtn">🎮 Переключить режим</button>
            <button id="exitToMenuBtn">🚪 Выйти в меню</button>
        </div>
        <div id="mode-indicator">Режим: Редактор</div>
        <div id="status">🖱️ ЛКМ — поставить блок | ПКМ — удалить блок</div>
    </div>

    <!-- Подключение Three.js глобально -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ======================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ========================
        let scene, camera, renderer, controls;
        let blocks = [];          // { mesh, type, x, y, z }
        let currentMaterial = 'wood';
        let currentGameName = null;   // имя загруженной игры
        let isGameMode = false;       // true - режим игры, false - редактор

        // Для режима игры (FPS)
        let player = {
            position: new THREE.Vector3(2, 2, 2),
            velocity: new THREE.Vector3(0, 0, 0),
            onGround: false,
            yaw: -Math.PI / 4,
            pitch: 0,
            speed: 5,
            jumpPower: 5
        };
        let keyState = { w: false, s: false, a: false, d: false, space: false };
        let mouseLocked = false;

        // Освещение и вспомогательные объекты
        let ambientLight, dirLight, backLight, fillLight;
        let groundPlane;   // для raycast в редакторе

        // ======================== ФУНКЦИИ ДЛЯ РАБОТЫ С БЛОКАМИ ========================
        function createMaterial(baseColor, patternColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = patternColor;
            ctx.lineWidth = 32;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 64, 0);
                ctx.lineTo(i * 64, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * 64);
                ctx.lineTo(canvas.width, i * 64);
                ctx.stroke();
            }
            ctx.fillStyle = patternColor;
            for (let i = 0; i < 200; i++) {
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 6, 6);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2);
            return new THREE.MeshStandardMaterial({ map: texture, roughness: 0.6, metalness: 0.1 });
        }

        const materials = {
            wood: createMaterial('#b87c4f', '#8b5a2b'),
            stone: createMaterial('#8a8a8a', '#5a5a5a'),
            brick: createMaterial('#b54e3a', '#8a2e1a'),
            grass: createMaterial('#5a9e4e', '#2c6e2c')
        };

        function addBlock(x, y, z, type) {
            if (blocks.some(b => b.x === x && b.y === y && b.z === z)) return false;
            const geometry = new THREE.BoxGeometry(0.96, 0.96, 0.96);
            const cube = new THREE.Mesh(geometry, materials[type]);
            cube.position.set(x, y, z);
            cube.castShadow = true;
            cube.receiveShadow = true;
            scene.add(cube);
            blocks.push({ mesh: cube, type, x, y, z });
            return true;
        }

        function removeBlock(mesh) {
            const index = blocks.findIndex(b => b.mesh === mesh);
            if (index !== -1) {
                scene.remove(mesh);
                blocks.splice(index, 1);
                return true;
            }
            return false;
        }

        function removeBlockAt(x, y, z) {
            const block = blocks.find(b => b.x === x && b.y === y && b.z === z);
            if (block) {
                scene.remove(block.mesh);
                blocks = blocks.filter(b => b !== block);
                return true;
            }
            return false;
        }

        function clearAllBlocks() {
            blocks.forEach(block => scene.remove(block.mesh));
            blocks = [];
        }

        // ======================== СОХРАНЕНИЕ / ЗАГРУЗКА ========================
        function saveCurrentGame() {
            if (!currentGameName) return;
            const data = blocks.map(b => ({ type: b.type, x: b.x, y: b.y, z: b.z }));
            const games = getAllGames();
            games[currentGameName] = data;
            localStorage.setItem('blockworld_games', JSON.stringify(games));
            alert(`Игра "${currentGameName}" сохранена!`);
        }

        function loadGame(name) {
            const games = getAllGames();
            const data = games[name];
            if (!data) return false;
            clearAllBlocks();
            for (const item of data) {
                addBlock(item.x, item.y, item.z, item.type);
            }
            currentGameName = name;
            return true;
        }

        function getAllGames() {
            const raw = localStorage.getItem('blockworld_games');
            if (!raw) return {};
            try {
                return JSON.parse(raw);
            } catch(e) {
                return {};
            }
        }

        function deleteGame(name) {
            const games = getAllGames();
            if (games[name]) {
                delete games[name];
                localStorage.setItem('blockworld_games', JSON.stringify(games));
                if (currentGameName === name) {
                    // если удалили текущую игру, выходим в меню
                    exitToMenu();
                }
                return true;
            }
            return false;
        }

        // ======================== НАСТРОЙКА СЦЕНЫ (общая) ========================
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            scene.fog = new THREE.FogExp2(0x111122, 0.008);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Освещение
            ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 25;
            dirLight.shadow.camera.left = -10;
            dirLight.shadow.camera.right = 10;
            dirLight.shadow.camera.top = 10;
            dirLight.shadow.camera.bottom = -10;
            scene.add(dirLight);
            backLight = new THREE.PointLight(0x556688, 0.4);
            backLight.position.set(-3, 2, -4);
            scene.add(backLight);
            fillLight = new THREE.PointLight(0x88aacc, 0.3);
            fillLight.position.set(0, -1, 0);
            scene.add(fillLight);

            // Пол (прозрачный для кликов в редакторе)
            groundPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(25, 25),
                new THREE.MeshStandardMaterial({ color: 0x226622, transparent: true, opacity: 0, side: THREE.DoubleSide })
            );
            groundPlane.rotation.x = -Math.PI / 2;
            groundPlane.position.y = -0.5;
            scene.add(groundPlane);

            // Сетка
            const gridHelper = new THREE.GridHelper(30, 20, 0x88aaff, 0x335588);
            gridHelper.position.y = -0.51;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.6;
            scene.add(gridHelper);
        }

        // ======================== РЕЖИМ РЕДАКТОРА ========================
        function enableEditorMode() {
            isGameMode = false;
            document.getElementById('mode-indicator').innerHTML = 'Режим: Редактор';
            document.getElementById('status').innerHTML = '🖱️ ЛКМ — поставить блок | ПКМ — удалить блок';
            // Уничтожаем старый controls, если был (от игры)
            if (controls) controls.dispose();
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = true;
            controls.maxPolarAngle = Math.PI / 2.2;
            controls.target.set(0, 2, 0);
            // Устанавливаем камеру в удобное положение
            camera.position.set(12, 10, 12);
            controls.target.set(0, 2, 0);
            controls.update();

            // Убираем обработчики игры
            document.removeEventListener('keydown', onKeyDown);
            document.removeEventListener('keyup', onKeyUp);
            renderer.domElement.removeEventListener('click', onGameClick);
            // Включаем обработчики редактора
            renderer.domElement.addEventListener('click', onEditorClick);
            renderer.domElement.addEventListener('contextmenu', onEditorRightClick);
            // Освобождаем указатель, если был захвачен
            if (document.pointerLockElement === renderer.domElement) {
                document.exitPointerLock();
            }
        }

        function disableEditorMode() {
            renderer.domElement.removeEventListener('click', onEditorClick);
            renderer.domElement.removeEventListener('contextmenu', onEditorRightClick);
        }

        // Редактор: левый клик
        function onEditorClick(event) {
            if (isGameMode) return;
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const allObjects = [groundPlane, ...blocks.map(b => b.mesh)];
            const intersects = raycaster.intersectObjects(allObjects);
            if (!intersects.length) return;

            let hitPoint = intersects[0].point;
            let hitObject = intersects[0].object;
            let newX = Math.round(hitPoint.x);
            let newY = Math.round(hitPoint.y);
            let newZ = Math.round(hitPoint.z);

            if (blocks.some(b => b.mesh === hitObject)) {
                const normal = intersects[0].face.normal;
                if (normal.y > 0.5) newY = Math.round(hitPoint.y + 0.5);
                else if (normal.y < -0.5) newY = Math.round(hitPoint.y - 0.5);
                else if (normal.x > 0.5) newX = Math.round(hitPoint.x + 0.5);
                else if (normal.x < -0.5) newX = Math.round(hitPoint.x - 0.5);
                else if (normal.z > 0.5) newZ = Math.round(hitPoint.z + 0.5);
                else if (normal.z < -0.5) newZ = Math.round(hitPoint.z - 0.5);
                newX = Math.round(newX); newY = Math.round(newY); newZ = Math.round(newZ);
            } else {
                if (Math.abs(hitPoint.y + 0.5) < 0.1) newY = 0;
                else newY = Math.round(hitPoint.y);
                newX = Math.round(hitPoint.x);
                newZ = Math.round(hitPoint.z);
            }
            if (newY > 8 || newY < -1) return;
            if (Math.abs(newX) > 12 || Math.abs(newZ) > 12) return;
            addBlock(newX, newY, newZ, currentMaterial);
        }

        function onEditorRightClick(event) {
            if (isGameMode) return;
            event.preventDefault();
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks.map(b => b.mesh));
            if (intersects.length) {
                removeBlock(intersects[0].object);
            }
        }

        // ======================== РЕЖИМ ИГРЫ (FPS) ========================
        function enableGameMode() {
            isGameMode = true;
            document.getElementById('mode-indicator').innerHTML = 'Режим: Игра (WASD, мышь, пробел)';
            document.getElementById('status').innerHTML = '🎮 Управление: W/A/S/D — движение, мышь — взгляд, пробел — прыжок';
            // Уничтожаем орбит контрол
            if (controls) controls.dispose();
            // Настраиваем камеру от первого лица
            // Размещаем игрока над блоками
            let startY = 2;
            // Найти верхний блок в позиции (0,0) для старта
            const blockBelow = blocks.find(b => Math.abs(b.x - player.position.x) < 0.5 && Math.abs(b.z - player.position.z) < 0.5 && b.y + 0.5 < player.position.y);
            if (!blockBelow) {
                player.position.set(0, 2, 0);
            }
            camera.position.copy(player.position);
            camera.rotation.order = 'YXZ';
            // Устанавливаем начальный угол
            camera.rotation.y = player.yaw;
            camera.rotation.x = player.pitch;

            // Добавляем обработчики для игры
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            renderer.domElement.addEventListener('click', onGameClick);
            // Захват мыши
            renderer.domElement.addEventListener('click', () => {
                renderer.domElement.requestPointerLock();
            });
            document.addEventListener('pointerlockchange', lockChange);
            document.addEventListener('mousemove', onMouseMove);
        }

        function disableGameMode() {
            document.removeEventListener('keydown', onKeyDown);
            document.removeEventListener('keyup', onKeyUp);
            renderer.domElement.removeEventListener('click', onGameClick);
            document.removeEventListener('pointerlockchange', lockChange);
            document.removeEventListener('mousemove', onMouseMove);
            if (document.pointerLockElement === renderer.domElement) {
                document.exitPointerLock();
            }
        }

        function lockChange() {
            if (document.pointerLockElement === renderer.domElement) {
                mouseLocked = true;
            } else {
                mouseLocked = false;
            }
        }

        function onMouseMove(e) {
            if (!isGameMode || !mouseLocked) return;
            const sensitivity = 0.002;
            player.yaw -= e.movementX * sensitivity;
            player.pitch -= e.movementY * sensitivity;
            if (player.pitch > Math.PI / 2.2) player.pitch = Math.PI / 2.2;
            if (player.pitch < -Math.PI / 2.2) player.pitch = -Math.PI / 2.2;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = player.yaw;
            camera.rotation.x = player.pitch;
        }

        function onKeyDown(e) {
            if (!isGameMode) return;
            switch(e.code) {
                case 'KeyW': keyState.w = true; break;
                case 'KeyS': keyState.s = true; break;
                case 'KeyA': keyState.a = true; break;
                case 'KeyD': keyState.d = true; break;
                case 'Space': 
                    if (player.onGround) {
                        player.velocity.y = player.jumpPower;
                        player.onGround = false;
                    }
                    break;
                case 'Escape':
                    if (document.pointerLockElement === renderer.domElement) {
                        document.exitPointerLock();
                    }
                    break;
            }
        }

        function onKeyUp(e) {
            if (!isGameMode) return;
            switch(e.code) {
                case 'KeyW': keyState.w = false; break;
                case 'KeyS': keyState.s = false; break;
                case 'KeyA': keyState.a = false; break;
                case 'KeyD': keyState.d = false; break;
            }
        }

        function onGameClick() {
            // просто для захвата мыши
        }

        function updatePlayerMovement(deltaTime) {
            if (!isGameMode) return;
            const move = new THREE.Vector3(0, 0, 0);
            if (keyState.w) move.z -= 1;
            if (keyState.s) move.z += 1;
            if (keyState.a) move.x -= 1;
            if (keyState.d) move.x += 1;
            move.normalize();
            // поворачиваем направление относительно камеры
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0;
            right.y = 0;
            forward.normalize();
            right.normalize();
            let vel = new THREE.Vector3(0, 0, 0);
            if (move.z !== 0) vel.addScaledVector(forward, move.z);
            if (move.x !== 0) vel.addScaledVector(right, move.x);
            vel.multiplyScalar(player.speed * deltaTime);
            // Простое движение с коллизиями
            let newPos = player.position.clone().add(vel);
            // Проверка коллизий по каждой оси
            if (!checkCollision(newPos.x, player.position.y, player.position.z)) player.position.x = newPos.x;
            if (!checkCollision(player.position.x, newPos.y, player.position.z)) player.position.y = newPos.y;
            if (!checkCollision(player.position.x, player.position.y, newPos.z)) player.position.z = newPos.z;

            // Гравитация
            player.velocity.y -= 15 * deltaTime;
            player.position.y += player.velocity.y * deltaTime;
            // Проверка столкновения снизу
            if (player.velocity.y <= 0) {
                if (checkCollision(player.position.x, player.position.y - 0.3, player.position.z)) {
                    player.position.y = Math.floor(player.position.y) + 1.0;
                    player.velocity.y = 0;
                    player.onGround = true;
                } else {
                    player.onGround = false;
                }
            } else {
                if (checkCollision(player.position.x, player.position.y + 0.5, player.position.z)) {
                    player.velocity.y = 0;
                }
                player.onGround = false;
            }

            // Ограничение по Y
            if (player.position.y < 0.5) {
                player.position.y = 0.5;
                player.velocity.y = 0;
                player.onGround = true;
            }

            camera.position.copy(player.position);
        }

        function checkCollision(x, y, z) {
            // Проверка столкновения с блоками (игрок - куб 0.6x1.8)
            const halfHeight = 0.9;
            const radius = 0.4;
            const checkBlocks = blocks.filter(b => Math.abs(b.x - x) < radius + 0.5 && Math.abs(b.z - z) < radius + 0.5 && Math.abs(b.y + 0.5 - y) < halfHeight + 0.5);
            for (let b of checkBlocks) {
                const dx = x - b.x;
                const dy = y - (b.y + 0.5);
                const dz = z - b.z;
                if (Math.abs(dx) < radius + 0.5 && Math.abs(dy) < halfHeight + 0.5 && Math.abs(dz) < radius + 0.5) {
                    return true;
                }
            }
            return false;
        }

        // ======================== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ========================
        function toggleMode() {
            if (isGameMode) {
                disableGameMode();
                enableEditorMode();
            } else {
                disableEditorMode();
                enableGameMode();
            }
        }

        function exitToMenu() {
            // Возвращаемся в главное меню
            if (isGameMode) disableGameMode();
            else disableEditorMode();
            // Очищаем сцену
            clearAllBlocks();
            currentGameName = null;
            document.getElementById('gameUI').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            // Обновляем список игр
            refreshGamesList();
        }

        // ======================== ГЛАВНОЕ МЕНЮ ========================
        function refreshGamesList() {
            const games = getAllGames();
            const container = document.getElementById('gamesList');
            container.innerHTML = '';
            let selected = null;
            for (let name in games) {
                const div = document.createElement('div');
                div.className = 'game-item';
                const span = document.createElement('span');
                span.textContent = name;
                span.onclick = () => {
                    // выделение
                    document.querySelectorAll('.game-item').forEach(el => el.style.background = '#2a3a48');
                    div.style.background = '#3a6ea5';
                    selected = name;
                };
                const delBtn = document.createElement('button');
                delBtn.textContent = 'Удалить';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (confirm(`Удалить игру "${name}"?`)) {
                        deleteGame(name);
                        refreshGamesList();
                    }
                };
                div.appendChild(span);
                div.appendChild(delBtn);
                container.appendChild(div);
            }
            window.selectedGameName = selected;
        }

        function createNewGame() {
            const name = document.getElementById('newGameName').value.trim();
            if (!name) {
                alert('Введите название игры');
                return;
            }
            const games = getAllGames();
            if (games[name]) {
                alert('Игра с таким названием уже существует');
                return;
            }
            // Создаём пустую игру
            games[name] = [];
            localStorage.setItem('blockworld_games', JSON.stringify(games));
            loadGame(name);
            startGameSession();
        }

        function loadSelectedGame() {
            const selected = getSelectedGameName();
            if (!selected) {
                alert('Выберите игру из списка');
                return;
            }
            if (loadGame(selected)) {
                startGameSession();
            } else {
                alert('Ошибка загрузки');
            }
        }

        function deleteSelectedGame() {
            const selected = getSelectedGameName();
            if (!selected) return;
            if (confirm(`Удалить игру "${selected}"?`)) {
                deleteGame(selected);
                refreshGamesList();
            }
        }

        function getSelectedGameName() {
            const selectedDiv = document.querySelector('.game-item span');
            if (!selectedDiv) return null;
            // более надёжно: пробегаем по элементам и ищем подсвеченный
            let selectedName = null;
            document.querySelectorAll('.game-item').forEach(item => {
                if (item.style.background === 'rgb(58, 110, 165)' || item.style.background === '#3a6ea5') {
                    selectedName = item.querySelector('span').textContent;
                }
            });
            return selectedName;
        }

        function startGameSession() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';
            // Сбрасываем позицию игрока
            player.position.set(0, 2, 0);
            player.velocity.set(0,0,0);
            // Включаем редактор по умолчанию
            enableEditorMode();
        }

        // ======================== ИНИЦИАЛИЗАЦИЯ ========================
        function init() {
            initScene();
            // Навешиваем обработчики меню
            document.getElementById('createNewBtn').addEventListener('click', createNewGame);
            document.getElementById('loadSelectedBtn').addEventListener('click', loadSelectedGame);
            document.getElementById('deleteSelectedBtn').addEventListener('click', deleteSelectedGame);
            document.getElementById('saveGameBtn').addEventListener('click', () => saveCurrentGame());
            document.getElementById('modeToggleBtn').addEventListener('click', toggleMode);
            document.getElementById('exitToMenuBtn').addEventListener('click', exitToMenu);
            // Материалы в редакторе
            document.getElementById('wood').addEventListener('click', () => { currentMaterial = 'wood'; updateMaterialUI('wood'); });
            document.getElementById('stone').addEventListener('click', () => { currentMaterial = 'stone'; updateMaterialUI('stone'); });
            document.getElementById('brick').addEventListener('click', () => { currentMaterial = 'brick'; updateMaterialUI('brick'); });
            document.getElementById('grass').addEventListener('click', () => { currentMaterial = 'grass'; updateMaterialUI('grass'); });
            refreshGamesList();
            // Запуск анимации
            let lastTime = performance.now();
            function animate() {
                const now = performance.now();
                let dt = Math.min(0.033, (now - lastTime) / 1000);
                lastTime = now;
                if (isGameMode) {
                    updatePlayerMovement(dt);
                } else {
                    if (controls) controls.update();
                }
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
        }

        function updateMaterialUI(activeId) {
            ['wood','stone','brick','grass'].forEach(id => {
                const btn = document.getElementById(id);
                if (id === activeId) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        init();
    </script>
</body>
</html>
