<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BlockVerse — конструктор и игра</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
        }

        .hidden {
            display: none;
        }

        /* ========== ГЛАВНОЕ МЕНЮ ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 60px;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffaa44, #ff5722);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .coin-badge {
            background: #f0b90b;
            color: #1e1e2a;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .nav-btn:hover {
            background: #ff5722;
            border-color: #ffaa44;
        }

        .games-grid, .my-projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 20px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            padding-right: 10px;
        }
        .game-card, .project-card {
            background: rgba(30, 35, 55, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.2s;
        }
        .game-card:hover, .project-card:hover {
            transform: translateY(-5px);
            border-color: #ffaa44;
        }
        .game-image {
            height: 140px;
            background: linear-gradient(135deg, #2a3a5a, #1a2a4a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .game-info, .project-card {
            padding: 16px;
        }
        .game-title {
            font-size: 20px;
            font-weight: bold;
        }
        .game-author {
            font-size: 12px;
            color: #aaa;
            margin: 4px 0;
        }
        .play-btn {
            background: #ff5722;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }

        /* Социальные панели и магазин */
        .social-panels { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .panel { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border-radius: 20px; padding: 16px; flex: 1; min-width: 250px; }
        .friend-list, .chat-messages { max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
        .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 8px 12px; border-radius: 40px; border: none; background: rgba(255,255,255,0.2); color: white; }
        .chat-input button { background: #ff5722; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 24px; max-height: calc(100vh - 200px); overflow-y: auto; }
        .shop-item { background: rgba(30, 35, 55, 0.9); border-radius: 20px; padding: 16px; text-align: center; backdrop-filter: blur(8px); }
        .price { color: #ffaa44; font-weight: bold; font-size: 20px; }
        .buy-btn { background: #2a6f3f; margin-top: 12px; }

        /* ========== КОНСТРУКТОР ========== */
        .editor-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #1e1f24;
        }
        .toolbar {
            background: #2c2f36;
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            border-bottom: 1px solid #3a3e47;
            align-items: center;
        }
        .tool-btn {
            background: #3a3e47;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: 0.1s;
        }
        .tool-btn.active { background: #ff5722; }
        .tool-btn:hover { background: #4a4e55; }
        
        .toolbar select {
            background: #3a3e47;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .toolbar input[type="color"] {
            width: 36px;
            height: 32px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #3a3e47;
        }

        .editor-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .viewport-area {
            flex: 1;
            position: relative;
            background: #1a1d24;
        }
        .editor-canvas {
            width: 100%;
            height: 100%;
        }
        .right-panel {
            width: 300px;
            background: #25282e;
            border-left: 1px solid #3a3e47;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            padding: 8px 12px;
            background: #1e1f24;
            font-weight: bold;
            border-bottom: 1px solid #3a3e47;
            font-size: 12px;
        }
        .explorer-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .explorer-item {
            padding: 4px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .explorer-item:hover { background: #3a3e47; }
        .explorer-item.selected { background: #0e639c; }

        .properties-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .prop-group { margin-bottom: 12px; }
        .prop-group label {
            display: block;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .prop-group input, .prop-group select {
            width: 100%;
            background: #1a1f2e;
            border: 1px solid #3a3e47;
            border-radius: 4px;
            padding: 6px 8px;
            color: white;
            font-size: 12px;
        }
        .prop-group button {
            background: #ff5722;
            border: none;
            padding: 6px;
            border-radius: 4px;
            color: white;
            width: 100%;
            cursor: pointer;
        }

        /* Мобильное управление */
        #mobileControls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
        .joystick-container {
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .joystick-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.9);
            border-radius: 25px;
            top: 35px;
            left: 35px;
            transition: 0.02s linear;
        }
        .mobile-jump-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: rgba(255,87,34,0.9);
            border: none;
            border-radius: 35px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
        }

        .exit-editor-btn, .exit-game {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff3333;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            z-index: 61;
            font-size: 12px;
        }
        .custom-game-ui {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 20;
            display: flex;
            gap: 10px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .right-panel { width: 250px; }
            .tool-btn { padding: 4px 8px; font-size: 10px; }
            .joystick-container { width: 100px; height: 100px; }
            .joystick-thumb { width: 40px; height: 40px; top: 30px; left: 30px; }
            .mobile-jump-btn { width: 60px; height: 60px; font-size: 14px; }
        }
    </style>
</head>
<body>
<script>
    if (!sessionStorage.getItem('blockverse_session')) {
        window.location.href = 'login.html';
    }
</script>

<div id="mainMenuScreen" class="screen">
    <div class="header">
        <div class="logo">🌟 BlockVerse</div>
        <div class="user-info">
            <div class="coin-badge">🪙 <span id="userCoins">0</span> монет</div>
            <div id="usernameDisplay" style="font-weight:500;"></div>
            <div class="nav-buttons">
                <div class="nav-btn" id="showGamesBtn">🎮 Игры</div>
                <div class="nav-btn" id="showMyProjectsBtn">📁 Мои проекты</div>
                <div class="nav-btn" id="showShopBtn">🛒 Магазин</div>
                <div class="nav-btn" id="showSocialBtn">👥 Социальное</div>
                <div class="nav-btn" id="showSettingsBtn">⚙️ Настройки</div>
                <div class="nav-btn" id="createGameBtn">🛠️ Конструктор</div>
                <div class="nav-btn" id="logoutBtn">🚪 Выйти</div>
            </div>
        </div>
    </div>
    <div id="gamesPanel">
        <h2 style="margin: 20px 0 10px;">🔥 Игровые серверы</h2>
        <div class="server-join"><input id="serverIdInput" placeholder="ID сервера"><button id="connectToServerBtn">🔗 Подключиться</button></div>
        <div id="gamesList" class="games-grid"></div>
    </div>
    <div id="myProjectsPanel" style="display:none;">
        <h2 style="margin: 20px 0 10px;">📁 Мои проекты</h2>
        <div id="myProjectsList" class="my-projects-grid"></div>
    </div>
    <div id="shopPanel" style="display:none;">
        <h2 style="margin: 20px 0 10px;">✨ Магазин предметов</h2>
        <div id="shopItemsList" class="shop-grid"></div>
        <div style="text-align:center;"><button id="earnCoinsBtn">➕ Получить 100 монет</button></div>
    </div>
    <div id="socialPanel" style="display:none;">
        <div class="social-panels">
            <div class="panel"><h3>Мои друзья</h3><div id="friendsList"></div><div class="chat-input"><input id="friendSearch" placeholder="Имя"><button id="addFriendBtn">Добавить</button></div></div>
            <div class="panel"><h3>Глобальный чат</h3><div id="chatMessages"></div><div class="chat-input"><input id="chatInput" placeholder="Сообщение..."><button id="sendChatBtn">Отправить</button></div></div>
        </div>
    </div>
    <div id="settingsPanel" style="display:none;">
        <h2 style="margin: 20px 0 10px;">⚙️ Настройки</h2>
        <label>Скорость движения: <input type="range" id="moveSpeed" min="2" max="6" step="0.5" value="4"></label>
        <button id="reportBugBtn">📝 Сообщить о проблеме</button>
        <div id="reportsList"></div>
    </div>
</div>

<!-- КОНСТРУКТОР -->
<div id="editorScreen" class="screen hidden">
    <div class="editor-layout">
        <div class="toolbar">
            <button class="tool-btn" id="modeMoveBtn">Переместить</button>
            <button class="tool-btn" id="modeRotateBtn">Повернуть</button>
            <button class="tool-btn" id="modeScaleBtn">Масштаб</button>
            <div style="width:1px; height:24px; background:#3a3e47;"></div>
            <button class="tool-btn" id="addPartBtn">➕ Куб</button>
            <button class="tool-btn" id="addSphereBtn">⚪ Сфера</button>
            <button class="tool-btn" id="addCylinderBtn">📦 Цилиндр</button>
            <button class="tool-btn" id="addConeBtn">🔺 Конус</button>
            <button class="tool-btn" id="addPlaneBtn">⬜ Плоскость</button>
            <div style="width:1px; height:24px; background:#3a3e47;"></div>
            <button class="tool-btn" id="duplicateBtn">📋 Дублировать</button>
            <button class="tool-btn" id="deleteBtn">🗑 Удалить</button>
            <button class="tool-btn" id="groupBtn">📁 Группа</button>
            <button class="tool-btn" id="ungroupBtn">📂 Разгруппировать</button>
            <div style="width:1px; height:24px; background:#3a3e47;"></div>
            <button class="tool-btn" id="undoBtn">↩️ Отмена</button>
            <button class="tool-btn" id="redoBtn">↪️ Повтор</button>
            <div style="width:1px; height:24px; background:#3a3e47;"></div>
            <input type="color" id="colorPicker" value="#ffaa44">
            <select id="materialSelect">
                <option value="plastic">Пластик</option>
                <option value="metal">Металл</option>
                <option value="wood">Дерево</option>
                <option value="glass">Стекло</option>
            </select>
            <div style="width:1px; height:24px; background:#3a3e47;"></div>
            <button class="tool-btn" id="exportBtn">📤 Экспорт</button>
            <button class="tool-btn" id="importBtn">📥 Импорт</button>
            <div style="width:1px; height:24px; background:#3a3e47;"></div>
            <button class="tool-btn" id="playTestBtn">🎮 Play</button>
            <button class="tool-btn" id="saveGameBtn">💾 Сохранить</button>
            <button class="tool-btn" id="publishGameBtn">🚀 Опубликовать</button>
            <button class="tool-btn" id="exitEditorBtn">✖ Выйти</button>
        </div>
        <div class="editor-main">
            <div class="viewport-area">
                <div id="editorCanvasContainer" class="editor-canvas"></div>
            </div>
            <div class="right-panel">
                <div class="panel-header">📁 Проводник</div>
                <div id="explorerTree" class="explorer-tree"></div>
                <div class="panel-header">⚙️ Свойства</div>
                <div id="propertiesContent" class="properties-content"></div>
            </div>
        </div>
    </div>
</div>

<div id="customGameScreen" class="screen hidden">
    <div id="customGameContainer" style="width:100%; height:100%;"></div>
    <div class="exit-game" id="exitGameBtn">✖ Выйти</div>
    <div class="custom-game-ui"><span>❤️ <span id="healthValue">100</span></span><span>🎒 <span id="inventoryCount">0</span></span><span>💰 <span id="coinValue">0</span></span></div>
</div>

<div id="mobileControls">
    <div class="joystick-container" id="joystickContainer"><div class="joystick-base"></div><div class="joystick-thumb" id="joystickThumb"></div></div>
    <button class="mobile-jump-btn" id="mobileJumpBtn">ПРЫЖОК</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>
<script type="module" src="platform.js"></script>
<script type="module" src="editor.js"></script>
</body>
</html>
