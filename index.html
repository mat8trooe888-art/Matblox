<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BlockVerse — мультиплеер + конструктор</title>
    <style>
        /* (стили без изменений, как в предыдущем ответе) */
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Segoe UI', 'Poppins', system-ui, sans-serif; background:linear-gradient(135deg,#0a0f1e,#0e1a2a); color:white; overflow:hidden; height:100vh; position:fixed; width:100%; touch-action:manipulation; }
        .screen { position:absolute; top:0; left:0; width:100%; height:100%; transition:opacity 0.3s ease; overflow-y:auto; padding:20px; -webkit-overflow-scrolling:touch; }
        .hidden { display:none; }
        .auth-container { max-width:400px; margin:10vh auto; background:rgba(20,25,40,0.9); backdrop-filter:blur(12px); border-radius:28px; padding:32px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); }
        .auth-container h2 { text-align:center; margin-bottom:24px; font-size:28px; }
        .auth-input { width:100%; padding:14px 16px; margin:12px 0; background:rgba(0,0,0,0.5); border:1px solid #3a4a6e; border-radius:40px; color:white; font-size:16px; outline:none; }
        .btn { background:#ff5722; border:none; padding:12px 20px; border-radius:40px; font-weight:bold; font-size:16px; color:white; cursor:pointer; transition:0.2s; width:100%; margin-top:12px; }
        .btn-secondary { background:#2c3e66; }
        .btn-guest { background:#4a6e8a; }
        .header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:30px; background:rgba(0,0,0,0.5); padding:12px 24px; border-radius:60px; backdrop-filter:blur(4px); }
        .user-info { display:flex; gap:20px; align-items:center; flex-wrap:wrap; }
        .coin-badge { background:#f0b90b; color:#1e1e2a; padding:6px 14px; border-radius:40px; font-weight:bold; display:flex; align-items:center; gap:6px; }
        .nav-buttons { display:flex; gap:12px; flex-wrap:wrap; }
        .nav-btn { background:#2c3e66; padding:8px 20px; border-radius:40px; cursor:pointer; font-weight:500; }
        .games-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:24px; margin-top:20px; }
        .game-card { background:rgba(30,35,55,0.8); backdrop-filter:blur(8px); border-radius:24px; overflow:hidden; transition:0.2s; cursor:pointer; border:1px solid rgba(255,255,255,0.15); position:relative; }
        .game-card:hover { transform:translateY(-5px); border-color:#ffaa44; }
        .game-image { height:140px; background:#2a3a5a; display:flex; align-items:center; justify-content:center; font-size:48px; }
        .game-info { padding:16px; }
        .game-title { font-size:20px; font-weight:bold; }
        .game-author { font-size:12px; color:#aaa; margin:4px 0; }
        .play-btn { background:#ff5722; border:none; padding:8px 16px; border-radius:30px; font-weight:bold; cursor:pointer; margin-top:8px; width:100%; }
        .social-panels { display:flex; gap:20px; margin-top:20px; flex-wrap:wrap; }
        .panel { background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); border-radius:20px; padding:16px; flex:1; min-width:250px; }
        .panel h3 { margin-bottom:12px; font-size:18px; }
        .friend-list, .chat-messages { max-height:200px; overflow-y:auto; margin-bottom:12px; }
        .friend-item { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.2); }
        .friend-actions button { background:none; border:none; color:#ffaa44; cursor:pointer; margin-left:8px; }
        .chat-input { display:flex; gap:8px; }
        .chat-input input { flex:1; padding:8px 12px; border-radius:40px; border:none; background:rgba(255,255,255,0.2); color:white; }
        .chat-input button { background:#ff5722; border:none; padding:8px 16px; border-radius:40px; cursor:pointer; }
        .shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; margin-top:24px; }
        .shop-item { background:#1e263a; border-radius:20px; padding:16px; text-align:center; }
        .shop-item h3 { margin:12px 0; }
        .price { color:#ffaa44; font-weight:bold; font-size:20px; }
        .buy-btn { background:#2a6f3f; margin-top:12px; }
        .editor-container { position:relative; width:100%; height:100%; }
        .editor-canvas { width:100%; height:100%; }
        .tools-panel, .properties-panel { position:absolute; background:rgba(20,25,40,0.95); backdrop-filter:blur(16px); border-radius:28px; padding:16px; z-index:40; border:1px solid rgba(255,255,255,0.2); overflow-y:auto; transition:all 0.2s; }
        .tools-panel { left:20px; top:20px; bottom:20px; width:320px; display:flex; flex-direction:column; gap:20px; }
        .properties-panel { right:20px; top:20px; bottom:20px; width:280px; font-size:13px; }
        .tool-section { background:rgba(0,0,0,0.5); border-radius:20px; padding:14px; }
        .tool-section h4 { margin-bottom:12px; font-size:16px; color:#ffaa44; }
        .tool-buttons { display:flex; flex-wrap:wrap; gap:12px; }
        .tool-btn { background:#2c3e66; border:none; padding:10px 14px; border-radius:40px; color:white; cursor:pointer; font-weight:bold; font-size:13px; transition:0.1s; flex:1; text-align:center; min-height:40px; }
        .tool-btn.active { background:#ff5722; box-shadow:0 0 8px #ff5722; }
        .tool-btn.special { background:#4a6e8a; }
        .block-palette { display:flex; gap:10px; flex-wrap:wrap; }
        .block-option { width:48px; height:48px; border-radius:12px; cursor:pointer; transition:0.1s; border:2px solid transparent; }
        .block-option.selected { border-color:#ffaa44; transform:scale(1.05); }
        .status-bar { position:absolute; bottom:20px; right:20px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:20px; font-size:12px; z-index:30; backdrop-filter:blur(4px); }
        .publish-btn, .exit-editor-btn { position:absolute; top:20px; right:20px; background:#ffaa44; border:none; padding:10px 20px; border-radius:40px; color:#1e1e2a; font-weight:bold; cursor:pointer; z-index:31; font-size:14px; }
        .exit-editor-btn { right:140px; background:#ff3333; color:white; }
        .prop-section { margin-bottom:16px; }
        .prop-section h4 { margin-bottom:8px; color:#ffaa44; }
        .prop-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .prop-row label { width:70px; }
        .prop-row input, .prop-row select { flex:1; background:#1a1f2e; border:1px solid #4a6e8a; border-radius:20px; padding:4px 8px; color:white; }
        #dragSelectionRect { position:fixed; border:1px dashed #fff; background:rgba(100,100,255,0.2); pointer-events:none; z-index:1000; }
        .panel-toggle { position:absolute; bottom:20px; left:20px; background:#2c3e66; border:none; border-radius:30px; padding:8px 12px; color:white; cursor:pointer; z-index:41; font-size:12px; }
        .panel-toggle.right { left:auto; right:20px; }
        @media (max-width:800px) {
            .tools-panel { width:260px; left:10px; top:10px; bottom:10px; padding:10px; gap:10px; }
            .tool-btn { padding:8px 10px; font-size:11px; min-height:36px; }
            .block-option { width:40px; height:40px; }
            .status-bar { font-size:10px; bottom:8px; right:8px; }
            .publish-btn, .exit-editor-btn { padding:6px 12px; font-size:12px; top:10px; right:10px; }
            .exit-editor-btn { right:100px; }
            .properties-panel { width:240px; right:10px; top:10px; bottom:10px; padding:12px; }
            .panel-toggle { bottom:10px; left:10px; }
            .panel-toggle.right { left:auto; right:10px; }
        }
        .exit-game { z-index:100; cursor:pointer; }
        .mobile-joystick { position:absolute; bottom:30px; left:30px; width:120px; height:120px; background:rgba(0,0,0,0.5); border-radius:60px; backdrop-filter:blur(8px); touch-action:none; z-index:30; }
        .joystick-thumb { position:absolute; width:50px; height:50px; background:rgba(255,255,255,0.8); border-radius:25px; top:35px; left:35px; pointer-events:none; }
        .jump-button { position:absolute; bottom:30px; right:30px; width:70px; height:70px; background:rgba(0,0,0,0.6); border-radius:35px; backdrop-filter:blur(8px); border:2px solid #ffaa44; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:bold; color:white; touch-action:manipulation; z-index:30; }
        .camera-zoom { position:absolute; bottom:30px; right:120px; background:rgba(0,0,0,0.6); border-radius:20px; padding:5px; display:flex; gap:5px; z-index:30; }
        .camera-zoom button { background:#2c3e66; border:none; padding:5px 10px; border-radius:20px; color:white; cursor:pointer; }
        .server-join { margin:20px 0; display:flex; gap:12px; align-items:center; background:rgba(0,0,0,0.5); padding:8px 16px; border-radius:40px; }
        .server-join input { flex:1; background:#1a1f2e; border:1px solid #ffaa44; border-radius:40px; padding:8px 16px; color:white; }
    </style>
</head>
<body>
<div id="authScreen" class="screen">...</div>
<div id="mainMenuScreen" class="screen hidden">...</div>
<div id="editorScreen" class="screen hidden">...</div>
<div id="customGameScreen" class="screen hidden">...</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
</script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

    // ========== ГЛОБАЛЬНЫЕ ДАННЫЕ ==========
    let currentUser = null;
    let users = JSON.parse(localStorage.getItem('blockverse_users')) || [];
    let customGames = JSON.parse(localStorage.getItem('blockverse_games')) || [];
    let chatMessages = JSON.parse(localStorage.getItem('blockverse_chat')) || [];
    let reports = JSON.parse(localStorage.getItem('blockverse_reports')) || [];

    const shopItems = [
        { id: 'skin_gold', name: 'Золотой скин', price: 250 },
        { id: 'pickaxe', name: 'Алмазная кирка', price: 500 },
        { id: 'trail', name: 'Искрящийся след', price: 150 }
    ];

    // ========== МОДЕЛЬ ПЕРСОНАЖА (НОВАЯ ССЫЛКА) ==========
    const PLAYER_MODEL_URL = 'https://raw.githubusercontent.com/mat8trooe888-art/Matblox/refs/heads/main/%D0%9D%D0%BE%D0%B2%D1%8B%D0%B9%20%D0%BF%D1%80%D0%BE%D0%B5%D0%BA%D1%82%207.gltf';
    let globalPlayerModel = null;

    async function loadPlayerModel() {
        if (globalPlayerModel) return globalPlayerModel;
        try {
            const model = await loadCustomModel(PLAYER_MODEL_URL);
            model.scale.set(0.5, 0.5, 0.5);
            model.traverse(child => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });
            globalPlayerModel = model;
            console.log('Модель персонажа загружена');
            return model;
        } catch (err) {
            console.error('Ошибка загрузки модели персонажа:', err);
            return null;
        }
    }

    function saveUsers() { localStorage.setItem('blockverse_users', JSON.stringify(users)); }
    function saveGames() { localStorage.setItem('blockverse_games', JSON.stringify(customGames)); }
    function saveChat() { localStorage.setItem('blockverse_chat', JSON.stringify(chatMessages.slice(-100))); }
    function saveReports() { localStorage.setItem('blockverse_reports', JSON.stringify(reports.slice(-50))); }

    // ========== АВТОРИЗАЦИЯ ==========
    function initUserData(username) {
        let user = users.find(u => u.username === username);
        if (!user) return null;
        if (user.coins === undefined) user.coins = 500;
        if (user.inventory === undefined) user.inventory = [];
        if (user.friends === undefined) user.friends = [];
        if (user.friendRequests === undefined) user.friendRequests = [];
        if (user.customModel === undefined) user.customModel = null;
        saveUsers();
        return user;
    }

    async function updateUIafterAuth() {
        if (!currentUser) return;
        document.getElementById('usernameDisplay').innerText = currentUser.username + (currentUser.isGuest ? ' (гость)' : '');
        document.getElementById('userCoins').innerText = currentUser.coins;
        renderMyProjects();
        renderShop();
        renderFriendsList();
        renderChat();
        renderReports();
        startChatPolling();
        await loadPlayerModel();
        connectToWebSocket();
    }

    function addCoins(amount) { if (!currentUser) return; currentUser.coins += amount; if (!currentUser.isGuest) saveUsers(); document.getElementById('userCoins').innerText = currentUser.coins; }
    function spendCoins(amount) { if (!currentUser) return false; if (currentUser.coins >= amount) { currentUser.coins -= amount; if (!currentUser.isGuest) saveUsers(); document.getElementById('userCoins').innerText = currentUser.coins; return true; } return false; }

    // ========== МАГАЗИН ==========
    function renderShop() {
        const container = document.getElementById('shopItemsList');
        if (!container) return;
        container.innerHTML = '';
        shopItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'shop-item';
            div.innerHTML = `<div style="font-size:48px;">${item.id==='skin_gold'?'👑':item.id==='pickaxe'?'⛏️':'✨'}</div><h3>${item.name}</h3><div class="price">${item.price} 🪙</div><button class="btn buy-btn" data-id="${item.id}" data-price="${item.price}">Купить</button>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.buy-btn').forEach(btn => btn.addEventListener('click', () => { const price = parseInt(btn.dataset.price); if (spendCoins(price)) { alert(`Вы купили ${btn.dataset.id}`); renderShop(); } else alert("Недостаточно монет!"); }));
        attachMobileEvents();
    }

    // ========== ДРУЗЬЯ ==========
    function renderFriendsList() {
        const container = document.getElementById('friendsList');
        if (!container) return;
        container.innerHTML = '';
        (currentUser.friends || []).forEach(friend => {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `<span>${friend}</span><div class="friend-actions"><button class="removeFriendBtn" data-friend="${friend}">❌</button></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.removeFriendBtn').forEach(btn => btn.addEventListener('click', () => { const friend = btn.dataset.friend; currentUser.friends = currentUser.friends.filter(f => f !== friend); saveUsers(); renderFriendsList(); }));
        attachMobileEvents();
    }
    function addFriend() {
        const friendName = document.getElementById('friendSearch').value.trim();
        if (!friendName || friendName === currentUser.username) return;
        const targetUser = users.find(u => u.username === friendName);
        if (!targetUser) { alert("Пользователь не найден"); return; }
        if (currentUser.friends.includes(friendName)) { alert("Уже в друзьях"); return; }
        if (!targetUser.friendRequests) targetUser.friendRequests = [];
        targetUser.friendRequests.push(currentUser.username);
        saveUsers();
        alert(`Заявка отправлена ${friendName}`);
        document.getElementById('friendSearch').value = '';
    }

    // ========== ЧАТ ==========
    function renderChat() {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        container.innerHTML = '';
        chatMessages.slice(-30).forEach(msg => { const div = document.createElement('div'); div.innerHTML = `<span style="color:#ffaa44;">[${msg.time}]</span> <b>${msg.user}:</b> ${msg.text}`; container.appendChild(div); });
        container.scrollTop = container.scrollHeight;
    }
    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !currentUser) return;
        const newMsg = { user: currentUser.username, text: text, time: new Date().toLocaleTimeString() };
        chatMessages.push(newMsg);
        saveChat();
        renderChat();
        input.value = '';
    }
    function startChatPolling() { setInterval(() => { const stored = JSON.parse(localStorage.getItem('blockverse_chat')) || []; if (JSON.stringify(stored) !== JSON.stringify(chatMessages)) { chatMessages = stored; renderChat(); } }, 2000); }

    // ========== МУЛЬТИПЛЕЕР (WebSocket) ==========
    let ws = null;
    let currentGameId = null;
    let myPlayerId = null;
    let remotePlayers = new Map();
    let gameScene = null, gameCamera = null, gameRenderer = null, gamePlayer = null;
    let gameActive = false;
    let gameAnimationId = null;
    let collisionBlocks = [];
    let keyState = { w: false, s: false, a: false, d: false, space: false };
    let joystickVector = { x: 0, z: 0 }, joystickActive = false;
    let moveSpeed = 4;
    let controls = null;
    const PLAYER_RADIUS = 0.4;
    const PLAYER_HALF_HEIGHT = 0.8;
    const BLOCK_HALF_SIZE = 0.45;

    function connectToWebSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        ws = new WebSocket('wss://matrix-5uvi.onrender.com');
        ws.onopen = () => { console.log('WebSocket connected'); requestGamesList(); };
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case 'games_list': renderGamesList(data.games); break;
                case 'game_created':
                    alert(`Игра "${data.gameName}" создана! ID: ${data.gameId}`);
                    navigator.clipboard.writeText(data.gameId).then(() => alert(`ID скопирован в буфер обмена: ${data.gameId}`)).catch(() => alert(`ID сервера: ${data.gameId}`));
                    requestGamesList();
                    break;
                case 'joined': myPlayerId = data.playerId; startGameSession(data.gameData, data.gameName); break;
                case 'player_joined': const newPlayer = createRemotePlayer(); newPlayer.position.set(data.position.x, data.position.y, data.position.z); gameScene.add(newPlayer); remotePlayers.set(data.playerId, newPlayer); break;
                case 'player_moved': const movedPlayer = remotePlayers.get(data.playerId); if (movedPlayer) movedPlayer.position.set(data.position.x, data.position.y, data.position.z); break;
                case 'player_left': const leftPlayer = remotePlayers.get(data.playerId); if (leftPlayer) gameScene.remove(leftPlayer); remotePlayers.delete(data.playerId); break;
                case 'error': alert(data.message); break;
            }
        };
        ws.onerror = (err) => console.error('WebSocket error:', err);
        ws.onclose = () => console.log('WebSocket closed');
    }

    function requestGamesList() { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'get_games_list' })); }
    function createGameOnServer(gameName, gameData) { if (!ws || ws.readyState !== WebSocket.OPEN) { alert('Нет соединения с сервером'); return; } ws.send(JSON.stringify({ type: 'create_game', gameName, author: currentUser.username, gameData })); }
    function joinGame(gameId) { if (!ws || ws.readyState !== WebSocket.OPEN) { alert('Нет соединения с сервером'); return; } currentGameId = gameId; ws.send(JSON.stringify({ type: 'join_game', gameId })); }
    function sendPosition(pos) { if (ws && ws.readyState === WebSocket.OPEN && currentGameId) ws.send(JSON.stringify({ type: 'update_position', position: pos })); }
    function leaveGame() { if (ws && ws.readyState === WebSocket.OPEN && currentGameId) ws.send(JSON.stringify({ type: 'leave_game' })); currentGameId = null; }

    function renderGamesList(games) {
        const container = document.getElementById('gamesList');
        if (!container) return;
        container.innerHTML = '';
        if (!games || games.length === 0) { container.innerHTML = '<p>Нет активных серверов. Создайте новый!</p>'; attachMobileEvents(); return; }
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <div class="game-image">🎲</div>
                <div class="game-info">
                    <div class="game-title">${game.name}</div>
                    <div class="game-author">👤 ${game.author} | 🟢 ${game.players} игроков</div>
                    <button class="play-btn" data-id="${game.id}">Играть</button>
                </div>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.play-btn').forEach(btn => btn.addEventListener('click', () => { const gameId = btn.dataset.id; joinGame(gameId); }));
        attachMobileEvents();
    }

    function findSpawnBlock(blocks) {
        for (let block of blocks) if (block.userData && block.userData.type === 'spawn') return block;
        return null;
    }

    const raycaster = new THREE.Raycaster();
    function applyCollision(pos, blocks) {
        let newPos = pos.clone();
        const bottomPoint = new THREE.Vector3(newPos.x, newPos.y - PLAYER_HALF_HEIGHT, newPos.z);
        // X
        for (let block of blocks) {
            const bPos = block.position;
            const bScale = block.scale;
            const bHalf = BLOCK_HALF_SIZE * bScale.x;
            const dx = newPos.x - bPos.x;
            const overlapX = PLAYER_RADIUS + bHalf - Math.abs(dx);
            if (overlapX > 0) {
                const overlapY = PLAYER_HALF_HEIGHT + BLOCK_HALF_SIZE * bScale.y - Math.abs(newPos.y - bPos.y);
                const overlapZ = PLAYER_RADIUS + BLOCK_HALF_SIZE * bScale.z - Math.abs(newPos.z - bPos.z);
                if (overlapY > 0 && overlapZ > 0) {
                    if (dx > 0) newPos.x = bPos.x + PLAYER_RADIUS + bHalf;
                    else newPos.x = bPos.x - PLAYER_RADIUS - bHalf;
                }
            }
        }
        // Z
        for (let block of blocks) {
            const bPos = block.position;
            const bScale = block.scale;
            const bHalf = BLOCK_HALF_SIZE * bScale.z;
            const dz = newPos.z - bPos.z;
            const overlapZ = PLAYER_RADIUS + bHalf - Math.abs(dz);
            if (overlapZ > 0) {
                const overlapX = PLAYER_RADIUS + BLOCK_HALF_SIZE * bScale.x - Math.abs(newPos.x - bPos.x);
                const overlapY = PLAYER_HALF_HEIGHT + BLOCK_HALF_SIZE * bScale.y - Math.abs(newPos.y - bPos.y);
                if (overlapX > 0 && overlapY > 0) {
                    if (dz > 0) newPos.z = bPos.z + PLAYER_RADIUS + bHalf;
                    else newPos.z = bPos.z - PLAYER_RADIUS - bHalf;
                }
            }
        }
        // Raycast для земли
        let onGround = false;
        raycaster.set(bottomPoint, new THREE.Vector3(0, -1, 0));
        const intersects = raycaster.intersectObjects(blocks);
        if (intersects.length > 0) {
            const hit = intersects[0];
            if (hit.distance < 0.3) {
                onGround = true;
                newPos.y = hit.point.y + PLAYER_HALF_HEIGHT;
            }
        }
        // Выталкивание по Y
        for (let block of blocks) {
            const bPos = block.position;
            const bScale = block.scale;
            const bHalfX = BLOCK_HALF_SIZE * bScale.x;
            const bHalfY = BLOCK_HALF_SIZE * bScale.y;
            const bHalfZ = BLOCK_HALF_SIZE * bScale.z;
            if (Math.abs(newPos.x - bPos.x) < PLAYER_RADIUS + bHalfX &&
                Math.abs(newPos.z - bPos.z) < PLAYER_RADIUS + bHalfZ &&
                Math.abs(newPos.y - bPos.y) < PLAYER_HALF_HEIGHT + bHalfY) {
                const dy = newPos.y - bPos.y;
                if (dy > 0) newPos.y = bPos.y + bHalfY + PLAYER_HALF_HEIGHT;
                else newPos.y = bPos.y - bHalfY - PLAYER_HALF_HEIGHT;
            }
        }
        return { pos: newPos, onGround };
    }

    async function startGameSession(gameData, gameName) {
        document.getElementById('mainMenuScreen').classList.add('hidden');
        document.getElementById('customGameScreen').classList.remove('hidden');
        const container = document.getElementById('customGameContainer');
        container.innerHTML = '';

        gameScene = new THREE.Scene();
        gameScene.background = new THREE.Color(0x87CEEB);
        gameScene.fog = new THREE.Fog(0x87CEEB, 30, 60);
        gameCamera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        gameRenderer = new THREE.WebGLRenderer({ antialias: true });
        gameRenderer.setSize(window.innerWidth, window.innerHeight);
        gameRenderer.shadowMap.enabled = true;
        container.appendChild(gameRenderer.domElement);

        const ambient = new THREE.AmbientLight(0x404060);
        gameScene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xfff5d1, 1);
        dirLight.position.set(5,10,7);
        dirLight.castShadow = true;
        gameScene.add(dirLight);
        const pointLight = new THREE.PointLight(0xffaa66, 1, 20);
        pointLight.position.set(0, 3, 0);
        pointLight.castShadow = true;
        gameScene.add(pointLight);

        collisionBlocks = [];

        // ВСЕГДА добавляем платформу
        const platformMesh = createMesh('cube', { x: 20/0.9, y: 1/0.9, z: 20/0.9 }, 0x6B8E23);
        platformMesh.position.set(0, -0.5, 0);
        gameScene.add(platformMesh);
        collisionBlocks.push(platformMesh);

        if (gameData && gameData.blocks) {
            gameData.blocks.forEach(block => {
                const mesh = createMesh(block.shape || 'cube', block.scale, block.color, block.opacity);
                mesh.position.set(block.x, block.y, block.z);
                mesh.rotation.set(block.rotation.x, block.rotation.y, block.rotation.z);
                mesh.userData = { ...mesh.userData, ...block.userData };
                gameScene.add(mesh);
                collisionBlocks.push(mesh);
            });
        }

        let spawnBlock = findSpawnBlock(collisionBlocks);
        let platformBlock = null;
        for (let block of collisionBlocks) {
            if (block === platformMesh) {
                platformBlock = block;
                break;
            }
        }

        let spawnX = spawnBlock ? spawnBlock.position.x : 0;
        let spawnZ = spawnBlock ? spawnBlock.position.z : 0;
        let spawnY = 0;
        if (platformBlock) {
            const bHalfY = BLOCK_HALF_SIZE * platformBlock.scale.y;
            spawnY = platformBlock.position.y + bHalfY + PLAYER_HALF_HEIGHT;
        } else {
            spawnY = PLAYER_HALF_HEIGHT;
        }
        const spawnPos = { x: spawnX, y: spawnY, z: spawnZ };

        // Создание модели с коррекцией позиции
        let playerModel = null;
        if (globalPlayerModel) {
            playerModel = globalPlayerModel.clone();
            // Вычисляем смещение модели, чтобы она стояла на платформе
            const box = new THREE.Box3().setFromObject(playerModel);
            const minY = box.min.y;
            const targetY = spawnPos.y - PLAYER_HALF_HEIGHT;
            playerModel.position.set(spawnPos.x, targetY - minY, spawnPos.z);
            gameScene.add(playerModel);
            gamePlayer = playerModel;
        } else {
            const defaultChar = createDefaultCharacter(0x3a86ff);
            defaultChar.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
            gameScene.add(defaultChar);
            gamePlayer = defaultChar;
        }

        const scriptedBlocks = [];
        for (let block of collisionBlocks) {
            if (block.userData.script && block.userData.script.trim() !== '') {
                try {
                    const scriptFunc = new Function('block', 'delta', block.userData.script);
                    scriptedBlocks.push({ block, func: scriptFunc });
                } catch(e) { console.warn(e); }
            }
        }

        const handleKey = (e, val) => {
            if(!gameActive) return;
            if(e.key==='w') keyState.w=val;
            if(e.key==='s') keyState.s=val;
            if(e.key==='a') keyState.a=val;
            if(e.key==='d') keyState.d=val;
            if(e.key===' ' || e.key==='Space') { keyState.space=val; e.preventDefault(); }
        };
        window.addEventListener('keydown', e=>handleKey(e,true));
        window.addEventListener('keyup', e=>handleKey(e,false));

        const joystickDiv = document.getElementById('joystick');
        const jumpBtnDiv = document.getElementById('jumpBtn');
        const zoomDiv = document.getElementById('cameraZoom');
        let joystickThumb = joystickDiv?.querySelector('.joystick-thumb');
        if (joystickDiv) {
            joystickDiv.style.display = 'block';
            jumpBtnDiv.style.display = 'flex';
            zoomDiv.style.display = 'flex';
            let joystickCenter = { x: 0, y: 0 };
            let activeTouch = false;
            const updateJoystick = (touch) => {
                if (!activeTouch) return;
                const dx = touch.clientX - joystickCenter.x;
                const dy = touch.clientY - joystickCenter.y;
                const maxDist = 40;
                let dist = Math.hypot(dx, dy);
                if (dist > maxDist) {
                    const angle = Math.atan2(dy, dx);
                    const nx = Math.cos(angle) * maxDist;
                    const ny = Math.sin(angle) * maxDist;
                    joystickVector = { x: nx / maxDist, z: ny / maxDist };
                    if (joystickThumb) joystickThumb.style.transform = `translate(${nx}px, ${ny}px)`;
                } else {
                    joystickVector = { x: dx / maxDist, z: dy / maxDist };
                    if (joystickThumb) joystickThumb.style.transform = `translate(${dx}px, ${dy}px)`;
                }
            };
            joystickDiv.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const rect = joystickDiv.getBoundingClientRect();
                joystickCenter = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                activeTouch = true;
                joystickActive = true;
                updateJoystick(e.touches[0]);
            });
            joystickDiv.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (activeTouch) updateJoystick(e.touches[0]);
            });
            joystickDiv.addEventListener('touchend', () => {
                activeTouch = false;
                joystickActive = false;
                joystickVector = { x: 0, z: 0 };
                if (joystickThumb) joystickThumb.style.transform = `translate(0px, 0px)`;
            });
            jumpBtnDiv.addEventListener('touchstart', (e) => { e.preventDefault(); keyState.space = true; });
            jumpBtnDiv.addEventListener('touchend', () => { keyState.space = false; });
            jumpBtnDiv.addEventListener('mousedown', () => { keyState.space = true; });
            jumpBtnDiv.addEventListener('mouseup', () => { keyState.space = false; });
        }

        controls = new OrbitControls(gameCamera, gameRenderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.copy(gamePlayer.position);

        const zoomInBtn = document.getElementById('zoomIn');
        const zoomOutBtn = document.getElementById('zoomOut');
        if (zoomInBtn) zoomInBtn.onclick = () => { controls.object.zoom = Math.min(3, controls.object.zoom - 0.2); controls.update(); };
        if (zoomOutBtn) zoomOutBtn.onclick = () => { controls.object.zoom = Math.max(0.5, controls.object.zoom + 0.2); controls.update(); };

        const scoreDiv = document.querySelector('#customGameScreen .custom-game-ui:first-of-type');
        if(scoreDiv) scoreDiv.innerText = 'Счёт: 0';

        let playerVelocityY = 0;
        const GRAVITY = 15;
        const JUMP_FORCE = 7;
        let isOnGround = false;
        let lastTime = performance.now()/1000;

        function update() {
            if(!gameActive) return;
            const now = performance.now()/1000;
            const delta = Math.min(0.033, now - lastTime);
            lastTime = now;

            for (let sb of scriptedBlocks) { try { sb.func(sb.block, delta); } catch(e) { console.warn(e); } }

            let moveX = 0, moveZ = 0;
            if (joystickActive && (joystickVector.x !== 0 || joystickVector.z !== 0)) {
                moveX = joystickVector.x;
                moveZ = joystickVector.z;
            } else {
                if(keyState.w) moveZ -= 1;
                if(keyState.s) moveZ += 1;
                if(keyState.a) moveX -= 1;
                if(keyState.d) moveX += 1;
                if(moveX !==0 || moveZ !==0) { const len = Math.hypot(moveX, moveZ); moveX/=len; moveZ/=len; }
            }
            // Поворот модели в направлении движения
            if (moveX !== 0 || moveZ !== 0) {
                const angle = Math.atan2(moveX, moveZ);
                gamePlayer.rotation.y = angle;
            }

            let speed = moveSpeed * delta;
            let newPos = gamePlayer.position.clone();
            newPos.x += moveX * speed;
            newPos.z += moveZ * speed;
            playerVelocityY -= GRAVITY * delta;
            newPos.y += playerVelocityY * delta;
            const collisionResult = applyCollision(newPos, collisionBlocks);
            newPos = collisionResult.pos;
            isOnGround = collisionResult.onGround;
            if (isOnGround && keyState.space) {
                playerVelocityY = JUMP_FORCE;
                isOnGround = false;
                keyState.space = false;
            }
            gamePlayer.position.copy(newPos);

            sendPosition({ x: gamePlayer.position.x, y: gamePlayer.position.y, z: gamePlayer.position.z });

            controls.target.copy(gamePlayer.position);
            controls.update();
            pointLight.position.set(gamePlayer.position.x, gamePlayer.position.y + 2, gamePlayer.position.z);
        }
        function animate() { if(!gameActive) return; gameAnimationId = requestAnimationFrame(animate); update(); gameRenderer.render(gameScene, gameCamera); }
        gameActive = true;
        animate();

        const exitBtn = document.querySelector('#customGameScreen .exit-game');
        exitBtn.onclick = () => {
            gameActive = false;
            if(gameAnimationId) cancelAnimationFrame(gameAnimationId);
            leaveGame();
            document.getElementById('customGameScreen').classList.add('hidden');
            document.getElementById('mainMenuScreen').classList.remove('hidden');
            requestGamesList();
        };
        attachMobileEvents();
    }

    // Остальные вспомогательные функции (createDefaultCharacter, createRemotePlayer, createMesh, loadCustomModel) – без изменений
    function createDefaultCharacter(color = 0x3a86ff) { /* ... как ранее */ }
    function createRemotePlayer() { /* ... */ }
    function createMesh(shape, size, color, opacity) { /* ... */ }
    async function loadCustomModel(url) { /* ... */ }
    function renderMyProjects() { /* ... */ }
    async function startLocalGameSession(gameData, gameName) { /* ... аналогично startGameSession с коррекцией позиции */ }
    function renderReports() { /* ... */ }
    function showReportDialog() { /* ... */ }
    function applySettings() { moveSpeed = parseFloat(document.getElementById('moveSpeed').value); }
    // ... (остальные функции и обработчики как в предыдущем ответе)
</script>
